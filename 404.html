<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Stackly</title>
    <meta name="description" content="Page not found. The page you're looking for doesn't exist or has been moved.">
    <link rel="icon" href="assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/error.css">
</head>

<body>

    <div class="page-wrapper">

        <main class="main-content">

            <section class="error-page">
                <i class="fa-solid fa-sun hero__floating-icon error-page__floating-icon"></i>
                <i class="fa-solid fa-wind hero__floating-icon error-page__floating-icon"></i>
                <i class="fa-solid fa-bolt hero__floating-icon error-page__floating-icon"></i>
                <i class="fa-solid fa-leaf hero__floating-icon error-page__floating-icon"></i>
                <div class="dot-pattern"></div>
                <div class="container">
                    <div class="error-page__inner">
                        <div class="error-page__content">
                            <span class="error-page__number">404</span>
                            <h1 class="error-page__title">Page Not Found</h1>
                            <p class="error-page__desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
                            <div class="error-page__actions">
                                <a href="#" onclick="history.back(); return false;" class="primary-btn">
                                    <i class="fa-solid fa-arrow-left"></i> Go Back
                                </a>
                                <a href="index.html" class="secondary-btn">
                                    <i class="fa-solid fa-house"></i> Back to Home
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

        </main>

    </div>

</body>

</html>
